events { 
    worker_connections 1024; 
}

http {
    # Define group of backend servers (Upstream)
    upstream backend_servers {
        # 'api' hamari docker service ka naam hai. 
        # Docker internal DNS ke zariye automatically saare scaled containers ka load split karega.
        server api:5000;
    }

    server {
        listen 80;

        # Incoming HTTP traffic ko intercept karna aur backend server group par bhejna
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}