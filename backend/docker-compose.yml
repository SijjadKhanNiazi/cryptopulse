version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - api_worker
    networks:
      - app-network

  api:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/cryptopulse
      - REDIS_URL=redis://redis:6379
      - RUN_WORKER=false
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  api_worker:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/cryptopulse
      - REDIS_URL=redis://redis:6379
      - RUN_WORKER=true
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  mongo:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  redis:
    image: redis:alpine
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
